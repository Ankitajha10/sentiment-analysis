<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Sentiment Analysis</h1>
            <p class="subtitle">AI-powered text emotion detection</p>
            
            <div class="input-group">
                <textarea id="userInput" placeholder="Example: I'm having a wonderful day and the weather is amazing!"></textarea>
                <p id="validationMsg" class="hidden">Please enter some text.</p>
            </div>

            <button id="analyzeBtn" onclick="analyzeSentiment()">Analyze Sentiment</button>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Processing text...</p>
            </div>

            <!-- Result Display -->
            <div id="resultContainer" class="hidden">
                <div id="resultCard" class="">
                    <h2 id="sentimentLabel">POSITIVE</h2>
                    <p>Confidence: <span id="confidenceScore">0%</span></p>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
