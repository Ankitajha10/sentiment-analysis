<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Sentiment Analysis</h1>
            <p>Enter text below to detect its emotion.</p>
            
            <textarea id="userInput" placeholder="Example: I'm having a great day!"></textarea>
            
            <button id="analyzeBtn" onclick="analyzeSentiment()">Analyze Sentiment</button>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Thinking...</p>
            </div>

            <div id="resultContainer" class="hidden">
                <div id="resultCard">
                    <h2 id="sentimentLabel"></h2>
                    <p>Confidence: <span id="confidenceScore"></span></p>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
